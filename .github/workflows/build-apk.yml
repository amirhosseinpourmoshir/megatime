name: ساخت APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # این خط رو اضافه کن تا بتونی دستی اجراش کنی

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
      
      - name: نصب Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # نسخه‌ای که استفاده میکنی
          channel: 'stable'
      
      - name: نصب وابستگی‌ها
        run: flutter pub get
      
      - name: بیلد APK
        run: flutter build apk --release
      
      - name: آپلود APK
        uses: actions/upload-artifact@v4
        with:
          name: megatime-apk
          path: build/app/outputs/flutter-apk/app-release.apk