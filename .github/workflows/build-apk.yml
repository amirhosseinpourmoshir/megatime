name: ساخت APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
      
      - name: نصب Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'   # <--- این عدد رو عوض کن
          channel: 'stable'
      
      - name: نصب وابستگی‌ها
        run: flutter pub get
      
      - name: بیلد APK
        run: flutter build apk --release
      
      - name: آپلود APK
        uses: actions/upload-artifact@v4
        with:
          name: megatime-apk
          path: build/app/outputs/flutter-apk/app-release.apk
